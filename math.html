<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math App - VxoDC</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #000;
    color: #fff;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: #fff;
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.card {
    background: #111;
    border: 1px solid #222;
    padding: 20px;
    border-radius: 16px;
    width: 300px;
}

input {
    padding: 10px;
    width: 120px;
    text-align: center;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    color: #aaa;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="math.html">Math App</a>
</nav>

<div class="container">

<h1>Math Practice</h1>

<div class="card">

<div id="q">Loading...</div>

<input id="a" type="number" placeholder="Answer">

<br>

<button onclick="check()">Submit</button>

<p class="result" id="r"></p>

<button onclick="newQ()">New Question</button>

</div>

</div>

<script>
let a, b, op;

function newQ() {
    a = Math.floor(Math.random() * 10);
    b = Math.floor(Math.random() * 10);

    let ops = ["+", "-", "*"];
    op = ops[Math.floor(Math.random() * ops.length)];

    document.getElementById("q").innerText = `${a} ${op} ${b} = ?`;
    document.getElementById("r").innerText = "";
    document.getElementById("a").value = "";
}

function check() {
    let val = Number(document.getElementById("a").value);
    let correct;

    if (op === "+") correct = a + b;
    if (op === "-") correct = a - b;
    if (op === "*") correct = a * b;

    let r = document.getElementById("r");

    if (val === correct) {
        r.innerText = "Correct ✔";
        r.style.color = "lightgreen";
    } else {
        r.innerText = "Wrong ❌";
        r.style.color = "red";
    }
}

newQ();
</script>

</body>
</html>
