<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Engine - Vxo Study OS</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #000;
    color: white;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: white;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 18px;
    text-align: center;
    width: 300px;
    backdrop-filter: blur(16px);
}

input {
    margin-top: 10px;
    padding: 10px;
    width: 120px;
    text-align: center;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
}

#result {
    margin-top: 10px;
    color: #aaa;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="about.html">About</a>
    <a href="math.html">Math</a>
</nav>

<div class="container">

<div class="card">

<h2>Math Engine</h2>

<div id="q"></div>

<input id="a" type="number" placeholder="Answer">

<br>

<button onclick="check()">Submit</button>
<button onclick="newQ()">New</button>

<p id="result"></p>

</div>

</div>

<script>
let x, y, op;

function newQ() {
    x = Math.floor(Math.random()*10);
    y = Math.floor(Math.random()*10);

    let ops = ["+", "-", "*"];
    op = ops[Math.floor(Math.random()*ops.length)];

    document.getElementById("q").innerText = `${x} ${op} ${y} = ?`;
    document.getElementById("result").innerText = "";
    document.getElementById("a").value = "";
}

function check() {
    let val = Number(document.getElementById("a").value);
    let correct;

    if (op === "+") correct = x + y;
    if (op === "-") correct = x - y;
    if (op === "*") correct = x * y;

    let r = document.getElementById("result");

    if (val === correct) {
        r.innerText = "Correct ✔";
        r.style.color = "lightgreen";
    } else {
        r.innerText = "Wrong ❌";
        r.style.color = "red";
    }
}

newQ();
</script>

</body>
</html>
