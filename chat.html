<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Assistant</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #000;
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* TOP BAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    z-index: 10;
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: white;
}

/* CHAT WRAPPER (FULL SCREEN) */
.wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

/* CHAT COLUMN */
.chat {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
}

/* MESSAGES AREA */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MESSAGE BUBBLES */
.msg {
    margin: 10px 0;
    line-height: 1.4;
}

.user {
    text-align: right;
    color: white;
}

.ai {
    color: #aaa;
}

/* INPUT BAR */
.inputBar {
    display: flex;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: white;
    color: black;
    font-weight: 600;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="math.html">Math</a>
    <a href="chat.html">Assistant</a>
</nav>

<div class="wrapper">
    <div class="chat">

        <!-- MESSAGES -->
        <div id="messages" class="messages"></div>

        <!-- INPUT -->
        <div class="inputBar">
            <input id="input" placeholder="Ask something..." />
            <button onclick="send()">Send</button>
        </div>

    </div>
</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* ENTER KEY SUPPORT */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
});

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

/* SIMPLE TYPING EFFECT */
function typeText(text) {
    const div = document.createElement("div");
    div.className = "msg ai";
    messages.appendChild(div);

    let i = 0;
    const interval = setInterval(() => {
        div.innerHTML = text.slice(0, i);
        i++;
        if (i > text.length) clearInterval(interval);
        messages.scrollTop = messages.scrollHeight;
    }, 10);
}

/* SEND MESSAGE */
async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "msg user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg ai";
    loading.innerText = "thinking...";
    messages.appendChild(loading);

    const res = await fetch("https://YOUR-VERCEL-URL/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    messages.removeChild(loading);
    typeText(data.reply);
}
</script>

</body>
</html>
