<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VxoDC</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #000;
    color: #fff;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: #fff;
}

.hidden {
    transform: translateY(-100%);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: clamp(40px, 6vw, 70px);
    margin: 0;
}

p {
    color: #aaa;
    max-width: 600px;
}

/* BUTTON STYLE */
.btn {
    margin-top: 20px;
    padding: 10px 18px;
    border-radius: 999px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="math.html">Math App</a>
</nav>

<div class="hero">
    <h1>VxoDC</h1>
    <p>A simple student project dashboard and math practice tool built with HTML, CSS, and JavaScript.</p>

    <a class="btn" href="math.html">Open Math App</a>
</div>

<script>
let lastScroll = 0;
const nav = document.querySelector("nav");

window.addEventListener("scroll", () => {
    let current = window.pageYOffset;

    if (current > lastScroll) {
        nav.classList.add("hidden");
    } else {
        nav.classList.remove("hidden");
    }

    lastScroll = current;
});
</script>

</body>
</html>
