<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VxoDC</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #000;
    color: #fff;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: #fff;
}

section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: clamp(40px, 6vw, 70px);
    margin: 0;
}

p {
    color: #aaa;
    max-width: 600px;
    font-size: 16px;
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
}

.card {
    background: #111;
    border: 1px solid #222;
    padding: 20px;
    border-radius: 16px;
    width: 300px;
}

input {
    padding: 10px;
    width: 100px;
    text-align: center;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

.fade {
    opacity: 0;
    transform: translateY(25px);
    transition: 0.6s ease;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

@media (max-width: 600px) {
    nav { font-size: 12px; gap: 12px; }
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#math">Math</a>
</nav>

<section id="home" class="fade">
    <h1>VxoDC</h1>
    <p>A simple project space and math practice app built with HTML, CSS, and JavaScript.</p>
</section>

<section id="about" class="fade">
    <h2>About</h2>
    <p>This is a clean, lightweight webpage. Easy to edit. Fast to load. No frameworks.</p>
</section>

<section id="math" class="fade">
    <h2>Math Practice</h2>

    <div class="card">
        <div id="q"></div>
        <input id="a" type="number" placeholder="Answer">
        <br>
        <button onclick="check()">Submit</button>
        <p id="r"></p>
        <button onclick="newQ()">New</button>
    </div>
</section>

<script>
let x, y;

function newQ() {
    x = Math.floor(Math.random()*10);
    y = Math.floor(Math.random()*10);
    document.getElementById("q").innerText = `${x} + ${y} = ?`;
    document.getElementById("r").innerText = "";
    document.getElementById("a").value = "";
}

function check() {
    let val = Number(document.getElementById("a").value);
    let r = document.getElementById("r");

    if (val === x + y) {
        r.innerText = "Correct";
        r.style.color = "lightgreen";
    } else {
        r.innerText = "Wrong";
        r.style.color = "red";
    }
}

newQ();

/* fade in */
const obs = new IntersectionObserver(e => {
    e.forEach(x => {
        if (x.isIntersecting) x.target.classList.add("show");
    });
});

document.querySelectorAll(".fade").forEach(el => obs.observe(el));
</script>

</body>
</html>
